# ============================================================
# M.Assist - Configuration
# All tunable settings live here. Nothing hardcoded in code.
# ============================================================

assistant:
  name: "M.Assist"          # spoken/displayed name
  wake_word: "jarvis"        # built-in Porcupine keyword for now

# ----- Text-to-speech -----
tts:
  enabled: true
  rate: 175          # words per minute (default ~200; 175 is calmer)
  volume: 1.0        # 0.0 .. 1.0
  voice_index: null  # null = system default; 0/1/... to pick a specific voice

# ----- Response handling -----
response:
  speak_first_paragraph_only: true   # speak para 1, print the whole thing
  post_speak_cooldown_s: 1.5     # settle time after speaking before re-listening

# ----- LLM backend selection -----
# backend: which path to use -> "local" | "gemini" | "groq"
# The cloud path uses primary -> fallback on rate limit / error.
llm:
  backend: "local"           # start local for free, no-key dev
  cloud_primary: "gemini"    # used when backend == "cloud-style" routing
  cloud_fallback: "groq"

  gemini:
    model: "gemini-2.5-flash"
    api_key_env: "GEMINI_API_KEY"   # name of env var, NOT the key itself
    rate_limit:
      requests_per_minute: 15
      requests_per_day: 1500
      tokens_per_minute: 1000000

  groq:
    model: "llama-3.3-70b-versatile"
    api_key_env: "GROQ_API_KEY"
    rate_limit:
      requests_per_minute: 30
      requests_per_day: 1000
      tokens_per_minute: 6000

  local:
    provider: "ollama"
    model: "gemma3:4b"        # fits 6GB VRAM (RTX 4050) comfortably
    host: "http://localhost:11434"

# ----- Speech-to-text (two-tier) -----
stt:
  primary: "vosk"
  fallback: "whisper"
  vosk_model_path: "models/vosk-model-small-en-us-0.15"   # match your unzipped folder
  whisper:
    model: "small"
    device: "cpu"          # was "auto" — avoids the CUDA DLL dependency
    compute_type: "int8"
  fallback_triggers:
    min_words: 2              # Vosk output under this -> try Whisper
    rms_noise_threshold: 0.04 # high ambient noise during capture -> prefer Whisper
  # recording (capturing the command after wake word)
  record:
    max_seconds: 8            # hard cap on command length
    silence_rms: 0.015        # below this = "silence"
    silence_duration_s: 1.0   # this much continuous silence = done speaking

# ----- Routing -----
router:
  embedding_model: "all-MiniLM-L6-v2"  # ~80MB, fast on CPU
  local_intent_threshold: 0.55          # cosine sim to treat as a local command

# ----- Semantic cache -----
cache:
  enabled: true
  similarity_threshold: 0.90   # cosine sim to count as a cache hit
  max_entries: 500

# ----- Audio -----
audio:
  library: "sounddevice"
  sample_rate: 16000
  channels: 1
  block_duration_ms: 30
  input_device: null
  wake_word:
    model: "hey_jarvis"        # openWakeWord pretrained model name
    threshold: 0.7             # 0..1 — higher = stricter (fewer false triggers)
    inference_framework: "onnx"  # Windows supports onnx, not tflite
    trigger_cooldown_s: 2.0    # ignore re-triggers within this many seconds

# ----- Logging -----
logging:
  level: "INFO"                # DEBUG | INFO | WARNING | ERROR
  file: "logs/m_assist.log"
  console: true

# ----- Conversation saving -----
conversation:
  save_enabled: true                 # master switch
  save_dir: "saved_conversations"    # where turn files land
  save_phrases:                      # what the user can say to save the last turn
    - "save that"
    - "save this"
    - "remember that"
    - "save the answer"